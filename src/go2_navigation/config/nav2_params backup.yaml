controller_server:
  ros__parameters:
    odom_topic: /utlidar/robot_odom 
    use_sim_time: False
    controller_frequency: 5.0
    # min_x_velocity_threshold: 0.001
    # min_y_velocity_threshold: 0.5
    # min_theta_velocity_threshold: 0.001

    progress_checker_plugin: "progress_checker"
    current_progress_checker: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] 
    current_goal_checker: "general_goal_checker"
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::PoseProgressChecker"
      required_movement_radius: 0.03
      required_movement_angle: 0.10
      movement_time_allowance: 40.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: True
      xy_goal_tolerance: 0.2
      yaw_goal_tolerance: 0.12

    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      angular_dist_threshold: 0.5                               
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 1.5
      rotate_to_goal_heading: True
      max_angular_accel: 3.5
      primary_controller: "dwb_core::DWBLocalPlanner"
      min_vel_x: 0.0
      max_vel_x: 0.8
      min_vel_y: -0.6
      max_vel_y: 0.6
      max_vel_theta: 1.2
      min_speed_xy: 0.0
      max_speed_xy: 0.8 
      acc_lim_x: 1.5
      acc_lim_y: 1.5
      acc_lim_theta: 2.5
      decel_lim_x: -1.5
      decel_lim_y: -1.5
      decel_lim_theta: -2.5
      vx_samples: 6
      vy_samples: 5
      vtheta_samples: 12
      sim_time: 0.8
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.25
      xy_goal_tolerance: 0.35
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: False
      stateful: True
      critics: ["BaseObstacle","Oscillation","Twirling","PathAlign","PathDist","GoalAlign","GoalDist"]
      BaseObstacle.scale: 8.0
      Oscillation.scale: 1.5
      Twirling.scale: 0.5
      PathAlign.scale: 12.0
      PathDist.scale: 24.0
      GoalAlign.scale: 8.0
      GoalDist.scale: 18.0


collision_monitor:
  ros__parameters:
    enabled: True
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel_nav"
    transform_tolerance: 0.3
    source_timeout: 2.0
    stop_pub_timeout: 0.0

    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      enabled: true
      min_height: 0.1
      max_height: 1.0

    polygons: ["FrontStop"]
    FrontStop:
      type: "polygon"
      points: "[[0.30,0.20],[0.30,-0.20],[0.10,-0.20],[0.10,0.20]]"
      action_type: "stop"
      min_points: 6


local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: False
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.05

      footprint: "[ [0.38, 0.18], [0.38, -0.18], [-0.38, -0.18], [-0.38, 0.18] ]"
      plugins: ["obstacle_layer", "denoise_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: True
          clearing: True
          inf_is_valid: True
          observation_persistence: 0.1
          min_obstacle_height: 0.0
          max_obstacle_height: 0.75
          raytrace_max_range: 10.0
          raytrace_min_range: 0.2
          obstacle_max_range: 4.5
          obstacle_min_range: 0.2
          reliability: best_effort

      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: True

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.35

      always_send_full_costmap: True


global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: False
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      static_map: True
      track_unknown_space: False
      
      footprint: "[ [0.38, 0.18], [0.38, -0.18], [-0.38, -0.18], [-0.38, 0.18] ]"
      plugins: ["static_layer", "obstacle_layer", "denoise_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: True
          clearing: True
          inf_is_valid: True
          observation_persistence: 0.1
          min_obstacle_height: 0.0
          max_obstacle_height: 0.75
          raytrace_max_range: 10.0
          raytrace_min_range: 0.2
          obstacle_max_range: 6.0
          obstacle_min_range: 0.2
          reliability: best_effort

      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: True

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.35

      always_send_full_costmap: False


map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

