/go2_teleop_node:
  ros__parameters:
    axis_linear:
      x: 1
      y: 3
    scale_linear:
      x: 0.5
      y: 0.5
    axis_angular:
      yaw: 6
    scale_angular:
      yaw: 1.0

    require_enable_button: false


/twist_mux:
