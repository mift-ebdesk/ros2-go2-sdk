    out_topic: cmd_vel_out
    topics:
      joy:
        topic   : cmd_vel_joy
        timeout : 0.5
        priority: 5
      navigation:
        topic   : cmd_vel
        # topic   : cmd_vel_nav
        timeout : 0.5
        priority: 10
